<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JJPR Auto Seeder</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="container">
    <header>
      <p class="eyebrow">start.gg CSV → JJPR ranking → seed CSV</p>
      <h1>JJPR Auto Seeder</h1>
      <p>参加者CSVの <code>Venue Type</code> が <code>competitor</code> の行だけを対象にし、<code>Short GamerTag</code> をJJPRで検索して順位順に並べ替えたシード表を作ります。複数候補が出たタグは、候補ごとに行を分けて表示します。</p>
    </header>

    <section class="card">
      <form id="seed-form">
        <label>
          参加者CSV
          <input name="file" type="file" accept=".csv,text/csv" required />
        </label>
        <label>
          Gamer tag列名
          <input name="tagColumn" value="Short GamerTag" />
        </label>
        <label>
          Venue type列名
          <input name="venueTypeColumn" value="Venue Type" />
        </label>
        <label>
          シード対象のVenue type
          <input name="includedVenueTypes" value="competitor" />
          <small>複数指定する場合は <code>competitor,specttor</code> のようにカンマ区切りにします。</small>
        </label>
        <label>
          JJPR URL
          <input name="url" value="https://smashrating.web.app/pr/jpr" />
        </label>
        <div class="buttons">
          <button type="submit">シード作成</button>
          <button type="button" id="download" disabled>CSVダウンロード</button>
        </div>
      </form>
      <p id="status" class="status"></p>
    </section>

    <section class="card">
      <h2>結果</h2>
      <div class="table-wrap">
        <table id="result-table">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

<script>
const form = document.querySelector('#seed-form');
const statusEl = document.querySelector('#status');
const downloadBtn = document.querySelector('#download');
const table = document.querySelector('#result-table');
let lastRows = [];

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function toCsv(rows) {
  if (!rows.length) return '';
  const headers = Object.keys(rows[0]);
  const quote = (value) => `"${String(value ?? '').replace(/"/g, '""')}"`;
  return [headers.map(quote).join(','), ...rows.map((row) => headers.map((h) => quote(row[h])).join(','))].join('\n');
}

function renderRows(rows) {
  lastRows = rows;
  const headers = ['seed', 'status', 'candidate_index', 'short_gamer_tag', 'jjpr_rank', 'jjpr_name', 'match_score'];
  table.querySelector('thead').innerHTML = `<tr>${headers.map((h) => `<th>${escapeHtml(h)}</th>`).join('')}</tr>`;
  table.querySelector('tbody').innerHTML = rows.map((row) => `<tr>${headers.map((h) => `<td>${escapeHtml(row[h])}</td>`).join('')}</tr>`).join('');
  downloadBtn.disabled = rows.length === 0;
}

form.addEventListener('submit', async (event) => {
  event.preventDefault();
  statusEl.textContent = 'Venue Type が competitor の参加者だけを対象に、JJPRを検索中です。';
  downloadBtn.disabled = true;
  table.querySelector('tbody').innerHTML = '';

  const fd = new FormData(form);
  const res = await fetch('api/seed', { method: 'POST', body: fd });
  const data = await res.json().catch(() => null);
  if (!res.ok) {
    statusEl.textContent = data?.error || 'エラーが発生しました。';
    return;
  }
  renderRows(data.rows || []);
  statusEl.textContent = `${data.rows.length}行の候補を作成しました。`;
});

downloadBtn.addEventListener('click', () => {
  const blob = new Blob(['\uFEFF' + toCsv(lastRows)], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'seeded.csv';
  a.click();
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>
