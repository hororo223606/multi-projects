<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JJPR Auto Seeder</title>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: #f6f7f9;
      color: #1f2937;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px;
    }

    h1 {
      margin-bottom: 8px;
    }

    h2 {
      margin-top: 0;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin: 20px 0;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    label {
      display: block;
      font-weight: 700;
      margin: 16px 0 6px;
    }

    input[type="file"],
    input[type="text"] {
      width: 100%;
      max-width: 520px;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: white;
      box-sizing: border-box;
    }

    button {
      margin-top: 20px;
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      background: #111827;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      margin-top: 16px;
      white-space: pre-wrap;
      font-weight: 600;
    }

    .table-wrap {
      overflow-x: auto;
      margin-top: 20px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 520px;
      font-size: 14px;
    }

    th,
    td {
      border: 1px solid #e5e7eb;
      padding: 8px 10px;
      text-align: left;
      white-space: nowrap;
    }

    th {
      background: #f3f4f6;
    }

    .small {
      color: #6b7280;
      font-size: 14px;
      line-height: 1.6;
    }

    .warning {
      color: #b45309;
    }

    .hidden {
      display: none;
    }

    .choice-group {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      margin: 16px 0;
      background: #fafafa;
    }

    .choice-title {
      font-weight: 800;
      margin-bottom: 8px;
    }

    .choice-help {
      color: #4b5563;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .choice-row {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 6px 0;
    }

    code {
      background: #f3f4f6;
      padding: 2px 5px;
      border-radius: 6px;
    }
  </style>
</head>

<body>
  <main>
    <h1>JJPR Auto Seeder</h1>
    <p class="small">
      start.ggの参加者CSVと、JJPRサイトから出力したCSVを読み込み、GamerTag完全一致でseedingします。
      すべてブラウザ上で処理されます。
    </p>

    <section class="card">
      <label for="attendeeFile">参加者CSV</label>
      <input id="attendeeFile" type="file" accept=".csv,text/csv" />

      <label for="jjprFile">JJPR CSV</label>
      <input id="jjprFile" type="file" accept=".csv,text/csv" />

      <label for="tagColumn">表示用の列名</label>
      <input id="tagColumn" type="text" value="Short GamerTag" />

      <label for="exactColumn">JJPRと完全一致させる列名</label>
      <input id="exactColumn" type="text" value="GamerTag" />

      <label for="venueColumn">Venue type列名</label>
      <input id="venueColumn" type="text" value="Venue Type" />

      <label for="venueValues">シード対象のVenue type</label>
      <input id="venueValues" type="text" value="competitor" />

      <button id="runButton">シードを作成</button>
      <button id="downloadButton" disabled>結果CSVをダウンロード</button>

      <div id="status" class="status"></div>

      <p class="small warning">
        注意: JJPR CSVの <code>name</code> と、参加者CSVの <code>GamerTag</code> が完全一致する人だけを採用します。
      </p>
    </section>

    <section id="selectionSection" class="card hidden">
      <h2>同名アカウントの選択</h2>
      <p class="small">
        参加者数よりJJPR上の同名アカウント数が多い名前があります。
        その参加者数まで順位を選んでください。選択数が参加者数に満たない場合、残りは <code>not_found</code> になります。
      </p>

      <div id="selectionGroups"></div>

      <button id="applySelectionButton" class="secondary">選択した順位で結果を作成</button>
    </section>

    <section class="card">
      <h2>結果プレビュー</h2>
      <div id="summary" class="small"></div>
      <div class="table-wrap">
        <table id="resultTable">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const attendeeFileEl = document.getElementById('attendeeFile');
    const jjprFileEl = document.getElementById('jjprFile');
    const tagColumnEl = document.getElementById('tagColumn');
    const exactColumnEl = document.getElementById('exactColumn');
    const venueColumnEl = document.getElementById('venueColumn');
    const venueValuesEl = document.getElementById('venueValues');

    const runButton = document.getElementById('runButton');
    const downloadButton = document.getElementById('downloadButton');
    const applySelectionButton = document.getElementById('applySelectionButton');

    const statusEl = document.getElementById('status');
    const summaryEl = document.getElementById('summary');
    const table = document.getElementById('resultTable');

    const selectionSection = document.getElementById('selectionSection');
    const selectionGroupsEl = document.getElementById('selectionGroups');

    let latestRows = [];
    let autoRows = [];
    let pendingGroups = [];

    function readFileAsText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = () => reject(reader.error || new Error('ファイルの読み込みに失敗しました。'));

        reader.readAsText(file, 'utf-8');
      });
    }

    function normalizeName(value) {
      return String(value || '')
        .normalize('NFKC')
        .toLowerCase()
        .replace(/[\s　_\-・.]+/g, '')
        .trim();
    }

    function normalizeColumnName(value) {
      return String(value || '')
        .normalize('NFKC')
        .toLowerCase()
        .replace(/[\s_\-]+/g, '');
    }

    function normalizeVenueType(value) {
      return String(value || '')
        .normalize('NFKC')
        .toLowerCase()
        .trim();
    }

    function findColumnKey(row, wantedColumn) {
      if (!row || !wantedColumn) return null;
      if (Object.prototype.hasOwnProperty.call(row, wantedColumn)) return wantedColumn;

      const wanted = normalizeColumnName(wantedColumn);

      return Object.keys(row).find((key) => normalizeColumnName(key) === wanted) || null;
    }

    function toNumber(value) {
      const text = String(value ?? '').replace(/,/g, '').trim();
      const num = Number(text);
      return Number.isFinite(num) ? num : null;
    }

    function cleanCell(value) {
      const text = String(value ?? '').trim();
      return text === 'null' ? '' : text;
    }

    function parseAttendeeCsv(csvText) {
      const result = Papa.parse(csvText, {
        header: true,
        skipEmptyLines: true,
      });

      if (result.errors && result.errors.length > 0) {
        console.warn('Attendee CSV parse warnings:', result.errors);
      }

      return result.data.filter((row) => {
        return Object.values(row).some((value) => String(value || '').trim() !== '');
      });
    }

    function parseJjprCsv(csvText) {
      const result = Papa.parse(csvText, {
        header: false,
        skipEmptyLines: true,
      });

      if (result.errors && result.errors.length > 0) {
        console.warn('JJPR CSV parse warnings:', result.errors);
      }

      const rows = [];

      for (const record of result.data) {
        if (!Array.isArray(record) || record.length < 4) continue;

        const first = String(record[0] ?? '').trim();

        // placement が数字でない行、つまりヘッダーを飛ばす
        if (!/^\d+$/.test(first)) continue;

        const placement = toNumber(record[0]);
        const id = cleanCell(record[1]);
        const point = toNumber(record[record.length - 1]);

        if (!Number.isFinite(placement)) continue;

        // JJPR CSVは実データが placement,id,name,prefix,shortName,point に近い。
        // nameやshortNameにカンマが含まれて列数が増える場合もあるので、中央をprefixとみなして復元する。
        const middle = record.slice(2, -1).map(cleanCell);

        let name = '';
        let prefix = '';
        let shortName = '';

        if (middle.length >= 3) {
          const prefixIndex = Math.floor(middle.length / 2);

          name = middle.slice(0, prefixIndex).join(',').trim();
          prefix = middle[prefixIndex] || '';
          shortName = middle.slice(prefixIndex + 1).join(',').trim();
        } else if (middle.length === 2) {
          name = middle[0] || '';
          shortName = middle[1] || '';
        } else if (middle.length === 1) {
          name = middle[0] || '';
          shortName = middle[0] || '';
        }

        if (!name) continue;

        rows.push({
          rank: placement,
          placement,
          id,
          name,
          playerName: name,
          prefix,
          shortName,
          point,
          rawText: record.join(','),
        });
      }

      return rows;
    }

    function buildJjprIndex(jjprRows) {
      const map = new Map();

      for (const row of jjprRows) {
        const key = normalizeName(row.name);

        if (!key) continue;

        if (!map.has(key)) {
          map.set(key, []);
        }

        map.get(key).push(row);
      }

      for (const candidates of map.values()) {
        candidates.sort((a, b) => {
          const rankA = Number.isFinite(a.rank) ? a.rank : Number.MAX_SAFE_INTEGER;
          const rankB = Number.isFinite(b.rank) ? b.rank : Number.MAX_SAFE_INTEGER;
          return rankA - rankB;
        });
      }

      return map;
    }

    function makeMatchedRow(candidate, displayName, originalOrder) {
      return {
        kind: 'matched',
        jjprRank: candidate.rank,
        name: candidate.name || displayName,
        originalOrder,
      };
    }

    function makeNotFoundRow(displayName, originalOrder) {
      return {
        kind: 'not_found',
        jjprRank: '',
        name: displayName,
        originalOrder,
      };
    }

    function buildParticipantGroups({
      attendees,
      tagColumn,
      exactColumn,
      venueColumn,
      venueValues,
    }) {
      if (attendees.length === 0) {
        throw new Error('参加者CSVに行がありません。');
      }

      const sample = attendees[0];

      const tagColumnKey = findColumnKey(sample, tagColumn);
      if (!tagColumnKey) {
        throw new Error(`参加者CSVに "${tagColumn}" 列がありません。見つかった列: ${Object.keys(sample).join(', ')}`);
      }

      const exactColumnKey = findColumnKey(sample, exactColumn) || tagColumnKey;
      const venueColumnKey = findColumnKey(sample, venueColumn);

      const allowedVenueTypes = new Set(
        venueValues
          .split(',')
          .map((value) => normalizeVenueType(value))
          .filter(Boolean)
      );

      const groups = new Map();
      let skippedByVenue = 0;
      let competitorOrder = 0;

      attendees.forEach((attendee, index) => {
        if (venueColumnKey) {
          const venueType = normalizeVenueType(attendee[venueColumnKey]);

          if (!allowedVenueTypes.has(venueType)) {
            skippedByVenue += 1;
            return;
          }
        }

        competitorOrder += 1;

        const shortTag = String(attendee[tagColumnKey] || '').trim();
        const exactName = String(attendee[exactColumnKey] || shortTag).trim();
        const key = normalizeName(exactName);

        if (!key) return;

        if (!groups.has(key)) {
          groups.set(key, {
            key,
            displayName: exactName,
            entries: [],
          });
        }

        groups.get(key).entries.push({
          attendee,
          shortTag,
          exactName,
          originalOrder: index + 1,
          competitorOrder,
        });
      });

      return {
        groups: Array.from(groups.values()),
        skippedByVenue,
        competitorCount: competitorOrder,
      };
    }

    function buildInitialSeeding({
      participantGroups,
      jjprRows,
    }) {
      const jjprIndex = buildJjprIndex(jjprRows);
      const rows = [];
      const pending = [];

      for (const group of participantGroups) {
        const participantCount = group.entries.length;
        const candidates = jjprIndex.get(group.key) || [];

        const originalOrders = group.entries.map((entry) => entry.originalOrder);
        const firstOriginalOrder = Math.min(...originalOrders);

        if (candidates.length === 0) {
          for (let i = 0; i < participantCount; i++) {
            rows.push(makeNotFoundRow(group.displayName, group.entries[i].originalOrder));
          }

          continue;
        }

        if (participantCount >= candidates.length) {
          candidates.forEach((candidate, index) => {
            const originalOrder = group.entries[index]?.originalOrder ?? firstOriginalOrder;
            rows.push(makeMatchedRow(candidate, group.displayName, originalOrder));
          });

          const missingCount = participantCount - candidates.length;

          for (let i = 0; i < missingCount; i++) {
            const entryIndex = candidates.length + i;
            const originalOrder = group.entries[entryIndex]?.originalOrder ?? firstOriginalOrder;
            rows.push(makeNotFoundRow(group.displayName, originalOrder));
          }

          continue;
        }

        pending.push({
          groupId: `group-${pending.length}`,
          key: group.key,
          displayName: group.displayName,
          participantCount,
          candidates,
          entries: group.entries,
          firstOriginalOrder,
        });
      }

      return {
        autoRows: rows,
        pendingGroups: pending,
      };
    }

    function finalizeRows(internalRows) {
      const sorted = [...internalRows].sort((a, b) => {
        const aFound = a.kind === 'matched';
        const bFound = b.kind === 'matched';

        if (aFound !== bFound) {
          return aFound ? -1 : 1;
        }

        if (aFound && bFound) {
          const rankA = Number.isFinite(Number(a.jjprRank)) ? Number(a.jjprRank) : Number.MAX_SAFE_INTEGER;
          const rankB = Number.isFinite(Number(b.jjprRank)) ? Number(b.jjprRank) : Number.MAX_SAFE_INTEGER;

          if (rankA !== rankB) return rankA - rankB;
        }

        return Number(a.originalOrder || 0) - Number(b.originalOrder || 0);
      });

      return sorted.map((row, index) => ({
        seed: index + 1,
        jjpr_rank: row.kind === 'matched' ? row.jjprRank : 'not_found',
        name: row.name,
      }));
    }

    function renderSelectionGroups(groups) {
      selectionGroupsEl.innerHTML = '';

      for (const group of groups) {
        const wrap = document.createElement('div');
        wrap.className = 'choice-group';
        wrap.dataset.groupId = group.groupId;
        wrap.dataset.maxSelect = String(group.participantCount);

        const title = document.createElement('div');
        title.className = 'choice-title';
        title.textContent = `「${group.displayName}」についてはJJPRの順位が ${group.candidates.map((c) => c.rank).join(', ')} のアカウントがありました。`;
        wrap.appendChild(title);

        const help = document.createElement('div');
        help.className = 'choice-help';
        help.textContent = `参加者CSV上では ${group.participantCount} 人います。最大 ${group.participantCount} 件まで選択できます。`;
        wrap.appendChild(help);

        for (const candidate of group.candidates) {
          const label = document.createElement('label');
          label.className = 'choice-row';

          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.value = String(candidate.rank);
          checkbox.dataset.groupId = group.groupId;
          checkbox.dataset.rank = String(candidate.rank);

          checkbox.addEventListener('change', () => {
            const checked = wrap.querySelectorAll('input[type="checkbox"]:checked');
            const maxSelect = Number(wrap.dataset.maxSelect || 0);

            if (checked.length > maxSelect) {
              checkbox.checked = false;
              alert(`「${group.displayName}」は最大 ${maxSelect} 件まで選択できます。`);
            }
          });

          const text = document.createElement('span');
          text.textContent = `${candidate.rank}位 / ${candidate.name} / ${candidate.point ?? ''}pt`;

          label.appendChild(checkbox);
          label.appendChild(text);
          wrap.appendChild(label);
        }

        selectionGroupsEl.appendChild(wrap);
      }

      selectionSection.classList.remove('hidden');
    }

    function buildRowsFromSelections() {
      const rows = [...autoRows];

      for (const group of pendingGroups) {
        const wrap = selectionGroupsEl.querySelector(`[data-group-id="${group.groupId}"]`);
        const selectedRanks = new Set(
          Array.from(wrap.querySelectorAll('input[type="checkbox"]:checked'))
            .map((input) => String(input.dataset.rank))
        );

        const selectedCandidates = group.candidates
          .filter((candidate) => selectedRanks.has(String(candidate.rank)))
          .sort((a, b) => {
            const rankA = Number.isFinite(a.rank) ? a.rank : Number.MAX_SAFE_INTEGER;
            const rankB = Number.isFinite(b.rank) ? b.rank : Number.MAX_SAFE_INTEGER;
            return rankA - rankB;
          });

        selectedCandidates.forEach((candidate, index) => {
          const originalOrder = group.entries[index]?.originalOrder ?? group.firstOriginalOrder;
          rows.push(makeMatchedRow(candidate, group.displayName, originalOrder));
        });

        const notFoundCount = group.participantCount - selectedCandidates.length;

        for (let i = 0; i < notFoundCount; i++) {
          const entryIndex = selectedCandidates.length + i;
          const originalOrder = group.entries[entryIndex]?.originalOrder ?? group.firstOriginalOrder;
          rows.push(makeNotFoundRow(group.displayName, originalOrder));
        }
      }

      return finalizeRows(rows);
    }

    function renderTable(rows) {
      const thead = table.querySelector('thead');
      const tbody = table.querySelector('tbody');

      thead.innerHTML = '';
      tbody.innerHTML = '';

      if (!rows.length) return;

      const columns = ['seed', 'jjpr_rank', 'name'];

      const tr = document.createElement('tr');

      for (const col of columns) {
        const th = document.createElement('th');
        th.textContent = col;
        tr.appendChild(th);
      }

      thead.appendChild(tr);

      for (const row of rows.slice(0, 200)) {
        const tr = document.createElement('tr');

        for (const col of columns) {
          const td = document.createElement('td');
          td.textContent = row[col] ?? '';
          tr.appendChild(td);
        }

        tbody.appendChild(tr);
      }
    }

    function renderFinalResult(rows) {
      latestRows = rows;

      const matched = latestRows.filter((row) => row.jjpr_rank !== 'not_found').length;
      const notFound = latestRows.filter((row) => row.jjpr_rank === 'not_found').length;

      summaryEl.textContent =
        `出力 ${latestRows.length}行 / seeded ${matched} / not_found ${notFound}`;

      renderTable(latestRows);
      downloadButton.disabled = latestRows.length === 0;
    }

    function downloadCsv(rows) {
      const csv = Papa.unparse(rows, {
        columns: ['seed', 'jjpr_rank', 'name'],
      });

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = 'seeded.csv';
      document.body.appendChild(a);
      a.click();
      a.remove();

      URL.revokeObjectURL(url);
    }

    runButton.addEventListener('click', async () => {
      statusEl.textContent = '';
      summaryEl.textContent = '';
      table.querySelector('thead').innerHTML = '';
      table.querySelector('tbody').innerHTML = '';
      selectionGroupsEl.innerHTML = '';
      selectionSection.classList.add('hidden');

      latestRows = [];
      autoRows = [];
      pendingGroups = [];

      downloadButton.disabled = true;

      const attendeeFile = attendeeFileEl.files[0];
      const jjprFile = jjprFileEl.files[0];

      if (!attendeeFile) {
        statusEl.textContent = '参加者CSVを選択してください。';
        return;
      }

      if (!jjprFile) {
        statusEl.textContent = 'JJPR CSVを選択してください。';
        return;
      }

      runButton.disabled = true;

      try {
        statusEl.textContent = 'CSVを読み込み中...';

        const [attendeeText, jjprText] = await Promise.all([
          readFileAsText(attendeeFile),
          readFileAsText(jjprFile),
        ]);

        const attendees = parseAttendeeCsv(attendeeText);
        const jjprRows = parseJjprCsv(jjprText);

        statusEl.textContent = `参加者 ${attendees.length}行、JJPR ${jjprRows.length}行を読み込みました。照合中...`;

        const participantResult = buildParticipantGroups({
          attendees,
          tagColumn: tagColumnEl.value || 'Short GamerTag',
          exactColumn: exactColumnEl.value || 'GamerTag',
          venueColumn: venueColumnEl.value || 'Venue Type',
          venueValues: venueValuesEl.value || 'competitor',
        });

        const seedResult = buildInitialSeeding({
          participantGroups: participantResult.groups,
          jjprRows,
        });

        autoRows = seedResult.autoRows;
        pendingGroups = seedResult.pendingGroups;

        if (pendingGroups.length > 0) {
          renderSelectionGroups(pendingGroups);

          statusEl.textContent =
            `同名候補の選択が必要です。対象グループ: ${pendingGroups.length}件\n` +
            `venue対象外: ${participantResult.skippedByVenue}人`;

          summaryEl.textContent = '順位を選択してから結果を作成してください。';
          return;
        }

        const finalRows = finalizeRows(autoRows);

        statusEl.textContent =
          `完了しました。venue対象外: ${participantResult.skippedByVenue}人`;

        renderFinalResult(finalRows);
      } catch (error) {
        console.error(error);
        statusEl.textContent = `エラー: ${error.message || String(error)}`;
      } finally {
        runButton.disabled = false;
      }
    });

    applySelectionButton.addEventListener('click', () => {
      try {
        const finalRows = buildRowsFromSelections();

        selectionSection.classList.add('hidden');
        statusEl.textContent = '選択を反映して結果を作成しました。';

        renderFinalResult(finalRows);
      } catch (error) {
        console.error(error);
        statusEl.textContent = `エラー: ${error.message || String(error)}`;
      }
    });

    downloadButton.addEventListener('click', () => {
      if (latestRows.length > 0) {
        downloadCsv(latestRows);
      }
    });
  </script>
</body>
</html>
