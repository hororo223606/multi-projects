name: Create JJPR seeds

on:
  workflow_dispatch:
    inputs:
      input_path:
        description: "Path to attendee CSV committed in this repo"
        required: true
        default: "input/attendees.csv"
      output_path:
        description: "Output CSV path"
        required: true
        default: "output/seeded.csv"
      jjpr_url:
        description: "JJPR ranking URL"
        required: true
        default: "https://smashrating.web.app/pr/jpr"

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Create seed CSV
        run: node src/cli.js "${{ inputs.input_path }}" "${{ inputs.output_path }}" "${{ inputs.jjpr_url }}"
      - uses: actions/upload-artifact@v4
        with:
          name: jjpr-seeded-csv
          path: ${{ inputs.output_path }}
