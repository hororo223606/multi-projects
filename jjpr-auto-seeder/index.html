<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JJPR Auto Seeder</title>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: #f6f7f9;
      color: #1f2937;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px;
    }

    h1 {
      margin-bottom: 8px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin: 20px 0;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    label {
      display: block;
      font-weight: 700;
      margin: 16px 0 6px;
    }

    input[type="file"],
    input[type="text"] {
      width: 100%;
      max-width: 520px;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: white;
      box-sizing: border-box;
    }

    button {
      margin-top: 20px;
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      margin-top: 16px;
      white-space: pre-wrap;
      font-weight: 600;
    }

    .table-wrap {
      overflow-x: auto;
      margin-top: 20px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 900px;
      font-size: 14px;
    }

    th,
    td {
      border: 1px solid #e5e7eb;
      padding: 8px 10px;
      text-align: left;
      white-space: nowrap;
    }

    th {
      background: #f3f4f6;
    }

    .small {
      color: #6b7280;
      font-size: 14px;
      line-height: 1.6;
    }

    .warning {
      color: #b45309;
    }
  </style>
</head>

<body>
  <main>
    <h1>JJPR Auto Seeder</h1>
    <p class="small">
      start.ggの参加者CSVと、JJPRサイトから出力したCSVを読み込み、GamerTag完全一致でseedingします。
      すべてブラウザ上で処理されます。
    </p>

    <section class="card">
      <label for="attendeeFile">参加者CSV</label>
      <input id="attendeeFile" type="file" accept=".csv,text/csv" />

      <label for="jjprFile">JJPR CSV</label>
      <input id="jjprFile" type="file" accept=".csv,text/csv" />

      <label for="tagColumn">検索表示用の列名</label>
      <input id="tagColumn" type="text" value="Short GamerTag" />

      <label for="exactColumn">JJPRと完全一致させる列名</label>
      <input id="exactColumn" type="text" value="GamerTag" />

      <label for="venueColumn">Venue type列名</label>
      <input id="venueColumn" type="text" value="Venue Type" />

      <label for="venueValues">シード対象のVenue type</label>
      <input id="venueValues" type="text" value="competitor,competiter" />

      <button id="runButton">シードを作成</button>
      <button id="downloadButton" disabled>結果CSVをダウンロード</button>

      <div id="status" class="status"></div>

      <p class="small warning">
        注意: JJPR CSVの <code>name</code> と、参加者CSVの <code>GamerTag</code> が完全一致する人だけを採用します。
        例: <code>ハル</code> は <code>ハル</code> のみ一致し、<code>ハルナコ</code> は除外されます。
      </p>
    </section>

    <section class="card">
      <h2>結果プレビュー</h2>
      <div id="summary" class="small"></div>
      <div class="table-wrap">
        <table id="resultTable">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const attendeeFileEl = document.getElementById('attendeeFile');
    const jjprFileEl = document.getElementById('jjprFile');
    const tagColumnEl = document.getElementById('tagColumn');
    const exactColumnEl = document.getElementById('exactColumn');
    const venueColumnEl = document.getElementById('venueColumn');
    const venueValuesEl = document.getElementById('venueValues');
    const runButton = document.getElementById('runButton');
    const downloadButton = document.getElementById('downloadButton');
    const statusEl = document.getElementById('status');
    const summaryEl = document.getElementById('summary');
    const table = document.getElementById('resultTable');

    let latestRows = [];

    function readFileAsText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = () => reject(reader.error || new Error('ファイルの読み込みに失敗しました。'));

        reader.readAsText(file, 'utf-8');
      });
    }

    function normalizeName(value) {
      return String(value || '')
        .normalize('NFKC')
        .toLowerCase()
        .replace(/[\s　_\-・.]+/g, '')
        .trim();
    }

    function normalizeColumnName(value) {
      return String(value || '')
        .normalize('NFKC')
        .toLowerCase()
        .replace(/[\s_\-]+/g, '');
    }

    function normalizeVenueType(value) {
      return String(value || '')
        .normalize('NFKC')
        .toLowerCase()
        .trim();
    }

    function findColumnKey(row, wantedColumn) {
      if (!row || !wantedColumn) return null;
      if (Object.prototype.hasOwnProperty.call(row, wantedColumn)) return wantedColumn;

      const wanted = normalizeColumnName(wantedColumn);

      return Object.keys(row).find((key) => normalizeColumnName(key) === wanted) || null;
    }

    function toNumber(value) {
      const text = String(value ?? '').replace(/,/g, '').trim();
      const num = Number(text);
      return Number.isFinite(num) ? num : null;
    }

    function cleanCell(value) {
      const text = String(value ?? '').trim();
      return text === 'null' ? '' : text;
    }

    function parseAttendeeCsv(csvText) {
      const result = Papa.parse(csvText, {
        header: true,
        skipEmptyLines: true,
      });

      if (result.errors && result.errors.length > 0) {
        console.warn('Attendee CSV parse warnings:', result.errors);
      }

      return result.data.filter((row) => {
        return Object.values(row).some((value) => String(value || '').trim() !== '');
      });
    }

    function parseJjprCsv(csvText) {
      const result = Papa.parse(csvText, {
        header: false,
        skipEmptyLines: true,
      });

      if (result.errors && result.errors.length > 0) {
        console.warn('JJPR CSV parse warnings:', result.errors);
      }

      const rows = [];

      for (const record of result.data) {
        if (!Array.isArray(record) || record.length < 4) continue;

        const first = String(record[0] ?? '').trim();

        // placement が数字でない行、つまりヘッダーを飛ばす
        if (!/^\d+$/.test(first)) continue;

        const placement = toNumber(record[0]);
        const id = cleanCell(record[1]);
        const point = toNumber(record[record.length - 1]);

        if (!Number.isFinite(placement)) continue;

        // JJPR CSVは見た目のheaderは placement,id,name,point でも、
        // 実データは placement,id,name,prefix,shortName,point のようになっている。
        const middle = record.slice(2, -1).map(cleanCell);

        let name = '';
        let prefix = '';
        let shortName = '';

        if (middle.length >= 3) {
          const prefixIndex = Math.floor(middle.length / 2);

          name = middle.slice(0, prefixIndex).join(',').trim();
          prefix = middle[prefixIndex] || '';
          shortName = middle.slice(prefixIndex + 1).join(',').trim();
        } else if (middle.length === 2) {
          name = middle[0] || '';
          shortName = middle[1] || '';
        } else if (middle.length === 1) {
          name = middle[0] || '';
          shortName = middle[0] || '';
        }

        if (!name) continue;

        rows.push({
          rank: placement,
          placement,
          id,
          name,
          playerName: name,
          prefix,
          shortName,
          point,
          rawText: record.join(','),
        });
      }

      return rows;
    }

    function buildJjprIndex(jjprRows) {
      const map = new Map();

      for (const row of jjprRows) {
        const key = normalizeName(row.name);

        if (!key) continue;

        if (!map.has(key)) {
          map.set(key, []);
        }

        map.get(key).push(row);
      }

      for (const candidates of map.values()) {
        candidates.sort((a, b) => {
          const rankA = Number.isFinite(a.rank) ? a.rank : Number.MAX_SAFE_INTEGER;
          const rankB = Number.isFinite(b.rank) ? b.rank : Number.MAX_SAFE_INTEGER;
          return rankA - rankB;
        });
      }

      return map;
    }

    function buildSeedRows({
      attendees,
      jjprRows,
      tagColumn,
      exactColumn,
      venueColumn,
      venueValues,
    }) {
      if (attendees.length === 0) {
        throw new Error('参加者CSVに行がありません。');
      }

      if (jjprRows.length === 0) {
        throw new Error('JJPR CSVからランキング行を読み取れませんでした。');
      }

      const sample = attendees[0];

      const tagColumnKey = findColumnKey(sample, tagColumn);
      if (!tagColumnKey) {
        throw new Error(`参加者CSVに "${tagColumn}" 列がありません。見つかった列: ${Object.keys(sample).join(', ')}`);
      }

      const exactColumnKey = findColumnKey(sample, exactColumn) || tagColumnKey;
      const venueColumnKey = findColumnKey(sample, venueColumn);

      const allowedVenueTypes = new Set(
        venueValues
          .split(',')
          .map((value) => normalizeVenueType(value))
          .filter(Boolean)
      );

      const jjprIndex = buildJjprIndex(jjprRows);
      const expandedRows = [];

      let skippedByVenue = 0;

      attendees.forEach((attendee, attendeeIndex) => {
        if (venueColumnKey) {
          const venueType = normalizeVenueType(attendee[venueColumnKey]);

          if (!allowedVenueTypes.has(venueType)) {
            skippedByVenue += 1;
            return;
          }
        }

        const shortTag = String(attendee[tagColumnKey] || '').trim();
        const exactName = String(attendee[exactColumnKey] || shortTag).trim();
        const key = normalizeName(exactName);
        const candidates = jjprIndex.get(key) || [];

        if (candidates.length === 0) {
          expandedRows.push({
            seed: '',
            status: 'not_found',
            candidate_index: '',
            competitor_order: expandedRows.length + 1,
            original_order: attendeeIndex + 1,
            short_gamer_tag: shortTag,
            gamer_tag: exactName,
            jjpr_rank: '',
            jjpr_id: '',
            jjpr_name: '',
            jjpr_short_name: '',
            jjpr_point: '',
            match_score: '',
            jjpr_raw_row: '',
            ...attendee,
          });

          return;
        }

        candidates.forEach((candidate, candidateIndex) => {
          expandedRows.push({
            seed: '',
            status: candidates.length > 1 ? 'multiple_candidates' : 'matched',
            candidate_index: candidateIndex + 1,
            competitor_order: expandedRows.length + 1,
            original_order: attendeeIndex + 1,
            short_gamer_tag: shortTag,
            gamer_tag: exactName,
            jjpr_rank: candidate.rank,
            jjpr_id: candidate.id,
            jjpr_name: candidate.name,
            jjpr_short_name: candidate.shortName,
            jjpr_point: candidate.point,
            match_score: 100,
            jjpr_raw_row: candidate.rawText,
            ...attendee,
          });
        });
      });

      expandedRows.sort((a, b) => {
        const rankA = Number.isFinite(Number(a.jjpr_rank)) && a.jjpr_rank !== ''
          ? Number(a.jjpr_rank)
          : Number.MAX_SAFE_INTEGER;

        const rankB = Number.isFinite(Number(b.jjpr_rank)) && b.jjpr_rank !== ''
          ? Number(b.jjpr_rank)
          : Number.MAX_SAFE_INTEGER;

        if (rankA !== rankB) return rankA - rankB;

        return Number(a.original_order || 0) - Number(b.original_order || 0);
      });

      expandedRows.forEach((row, index) => {
        row.seed = index + 1;
      });

      return {
        rows: expandedRows,
        skippedByVenue,
      };
    }

    function renderTable(rows) {
      const thead = table.querySelector('thead');
      const tbody = table.querySelector('tbody');

      thead.innerHTML = '';
      tbody.innerHTML = '';

      if (!rows.length) return;

      const previewColumns = [
        'seed',
        'status',
        'candidate_index',
        'short_gamer_tag',
        'gamer_tag',
        'jjpr_rank',
        'jjpr_name',
        'jjpr_short_name',
        'jjpr_point',
        'match_score',
      ];

      const tr = document.createElement('tr');

      for (const col of previewColumns) {
        const th = document.createElement('th');
        th.textContent = col;
        tr.appendChild(th);
      }

      thead.appendChild(tr);

      for (const row of rows.slice(0, 100)) {
        const tr = document.createElement('tr');

        for (const col of previewColumns) {
          const td = document.createElement('td');
          td.textContent = row[col] ?? '';
          tr.appendChild(td);
        }

        tbody.appendChild(tr);
      }
    }

    function downloadCsv(rows) {
      const csv = Papa.unparse(rows);
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);

      const a = document.createElement('a');
      a.href = url;
      a.download = 'seeded.csv';
      document.body.appendChild(a);
      a.click();
      a.remove();

      URL.revokeObjectURL(url);
    }

    runButton.addEventListener('click', async () => {
      statusEl.textContent = '';
      summaryEl.textContent = '';
      table.querySelector('thead').innerHTML = '';
      table.querySelector('tbody').innerHTML = '';
      latestRows = [];
      downloadButton.disabled = true;

      const attendeeFile = attendeeFileEl.files[0];
      const jjprFile = jjprFileEl.files[0];

      if (!attendeeFile) {
        statusEl.textContent = '参加者CSVを選択してください。';
        return;
      }

      if (!jjprFile) {
        statusEl.textContent = 'JJPR CSVを選択してください。';
        return;
      }

      runButton.disabled = true;

      try {
        statusEl.textContent = 'CSVを読み込み中...';

        const [attendeeText, jjprText] = await Promise.all([
          readFileAsText(attendeeFile),
          readFileAsText(jjprFile),
        ]);

        const attendees = parseAttendeeCsv(attendeeText);
        const jjprRows = parseJjprCsv(jjprText);

        statusEl.textContent = `参加者 ${attendees.length}行、JJPR ${jjprRows.length}行を読み込みました。照合中...`;

        const result = buildSeedRows({
          attendees,
          jjprRows,
          tagColumn: tagColumnEl.value || 'Short GamerTag',
          exactColumn: exactColumnEl.value || 'GamerTag',
          venueColumn: venueColumnEl.value || 'Venue Type',
          venueValues: venueValuesEl.value || 'competitor,competiter',
        });

        latestRows = result.rows;

        const matched = latestRows.filter((row) => row.status === 'matched').length;
        const multiple = latestRows.filter((row) => row.status === 'multiple_candidates').length;
        const notFound = latestRows.filter((row) => row.status === 'not_found').length;

        summaryEl.textContent =
          `出力 ${latestRows.length}行 / matched ${matched} / multiple_candidates ${multiple} / not_found ${notFound} / venue対象外 ${result.skippedByVenue}`;

        statusEl.textContent = '完了しました。';
        renderTable(latestRows);
        downloadButton.disabled = latestRows.length === 0;
      } catch (error) {
        console.error(error);
        statusEl.textContent = `エラー: ${error.message || String(error)}`;
      } finally {
        runButton.disabled = false;
      }
    });

    downloadButton.addEventListener('click', () => {
      if (latestRows.length > 0) {
        downloadCsv(latestRows);
      }
    });
  </script>
</body>
</html>
