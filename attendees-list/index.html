<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>参加者名簿</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #172033;
      --muted: #667085;
      --line: #e5e7eb;
      --accent: #2563eb;
      --accent-soft: #eff6ff;
      --ok: #047857;
      --ok-soft: #ecfdf5;
      --warn: #b45309;
      --warn-soft: #fffbeb;
      --danger: #dc2626;
      --danger-soft: #fef2f2;
      --checked: #f2f4f7;
      --shadow: 0 16px 40px rgba(23, 32, 51, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 340px);
    }

    header {
      position: static;
      background: rgba(246, 247, 251, 0.92);
      border-bottom: 1px solid rgba(229, 231, 235, 0.9);
      backdrop-filter: blur(14px);
    }

    .topbar {
      max-width: 1240px;
      margin: 0 auto;
      padding: 18px 20px 16px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(22px, 3vw, 32px);
      line-height: 1.15;
      letter-spacing: -0.03em;
    }

    .floating-settings-toggle {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 100;
      min-width: 0;
      padding: 7px 10px;
      border-color: var(--accent);
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-size: 12px;
      line-height: 1;
      box-shadow: 0 8px 22px rgba(37, 99, 235, 0.24);
    }

    .floating-settings-toggle:hover {
      background: #1d4ed8;
    }

    .settings-bar {
      display: block;
      margin-bottom: 12px;
      padding-right: 76px;
    }

    .settings-summary {
      width: 100%;
      min-width: 0;
      padding: 9px 12px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: rgba(255, 255, 255, 0.76);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .settings-panel {
      display: block;
    }

    .settings-panel.is-hidden {
      display: none;
    }

    body.settings-hidden #appHeader,
    body.settings-hidden .status-wrap {
      display: none !important;
    }

    body.settings-hidden main {
      margin-top: 12px;
      padding-top: 28px;
    }

    body.settings-hidden .table-wrap {
      max-height: calc(100vh - 150px);
    }

    .controls {
      display: grid;
      grid-template-columns: 1.25fr repeat(2, minmax(160px, 0.7fr));
      gap: 12px;
      align-items: stretch;
    }

    .station-controls {
      display: grid;
      grid-template-columns: minmax(160px, 0.75fr) minmax(260px, 1.2fr) auto;
      gap: 12px;
      margin-top: 12px;
      align-items: stretch;
    }

    .control-card {
      display: grid;
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.86);
    }

    .control-card strong {
      display: block;
      font-size: 15px;
    }

    .help {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type="number"],
    input[type="text"],
    input[type="file"],
    select,
    button {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 11px;
      font: inherit;
      background: #fff;
      color: var(--text);
      outline: none;
      transition: border-color 120ms ease, box-shadow 120ms ease, transform 120ms ease;
    }

    input[type="number"],
    input[type="text"],
    input[type="file"],
    select { width: 100%; }

    input[type="file"] { cursor: pointer; }

    input:focus,
    select:focus,
    button:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    button {
      min-width: 110px;
      cursor: pointer;
      font-weight: 700;
      background: #fff;
    }

    button:hover { transform: translateY(-1px); }

    .yen {
      color: var(--muted);
      white-space: nowrap;
    }

    .status-wrap {
      max-width: 1240px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .status {
      margin: 12px 0 0;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .status.ok {
      color: var(--ok);
      background: var(--ok-soft);
      border-color: #bbf7d0;
    }

    .status.warn {
      color: var(--warn);
      background: var(--warn-soft);
      border-color: #fde68a;
    }

    .status.error {
      color: var(--danger);
      background: var(--danger-soft);
      border-color: #fecaca;
    }

    main {
      max-width: 1240px;
      margin: 20px auto;
      padding: 0 20px 28px;
    }

    .lists {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      align-items: start;
    }

    .roster-card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .roster-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      padding: 16px 16px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #fff, #fbfcff);
    }

    h2 {
      margin: 0;
      font-size: 22px;
      letter-spacing: -0.02em;
    }

    .summary {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .fee-badge {
      min-width: 132px;
      padding: 10px 12px;
      border-radius: 14px;
      background: var(--accent-soft);
      color: #1d4ed8;
      text-align: right;
      font-weight: 800;
      line-height: 1.2;
    }

    .fee-badge small {
      display: block;
      margin-bottom: 3px;
      color: #475569;
      font-size: 11px;
      font-weight: 700;
    }

    .table-wrap {
      max-height: calc(100vh - 340px);
      min-height: 360px;
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      padding: 10px 12px;
      color: var(--muted);
      background: #f9fafb;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      text-align: left;
      white-space: nowrap;
    }

    tbody td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      vertical-align: middle;
      background: #fff;
    }

    tbody tr.checked td {
      background: var(--checked);
      color: #667085;
    }

    tbody tr.checked .name {
      text-decoration: line-through;
      text-decoration-thickness: 1px;
    }

    .name {
      font-weight: 800;
      word-break: break-word;
    }

    .station-select {
      width: 120px;
      text-align: center;
      padding: 9px 8px;
    }

    .station-select.invalid {
      border-color: #f97316;
      background: #fff7ed;
      color: #9a3412;
    }

    .check-cell {
      width: 92px;
      text-align: center;
    }

    .station-cell { width: 140px; }

    .check-cell input {
      width: 22px;
      height: 22px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .empty {
      padding: 28px 18px;
      color: var(--muted);
      text-align: center;
      line-height: 1.55;
    }

    .note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }

    @media (max-width: 980px) {
      header { position: static; }
      .settings-bar { align-items: stretch; flex-direction: column; }
      .settings-summary { white-space: normal; }
      .controls,
      .station-controls,
      .lists { grid-template-columns: 1fr; }
      .table-wrap { max-height: 62vh; }
      button { width: 100%; }
    }

    @media print {
      header { position: static; backdrop-filter: none; }
      body { background: #fff; }
      .status-wrap, .note, .settings-bar, .floating-settings-toggle { display: none; }
      .settings-panel.is-hidden { display: block; }
      .lists { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .table-wrap { max-height: none; overflow: visible; min-height: 0; }
      .roster-card { box-shadow: none; }
      input[type="file"], .help, button { display: none; }
    }
  </style>
</head>
<body>
  <button id="settingsToggleButton" class="floating-settings-toggle" type="button" aria-expanded="true" aria-controls="settingsPanel">設定隠す</button>

  <header id="appHeader">
    <div class="topbar">
      <h1>参加者名簿</h1>

      <div class="settings-bar" aria-label="現在の設定概要">
        <div id="settingsSummary" class="settings-summary">CSV未選択 / 一般枠: 未入力 / 持参枠: 未入力 / 台番号上限: 未設定</div>
      </div>

      <div id="settingsPanel" class="settings-panel">
        <div class="controls" aria-label="CSVと参加費の入力">
        <label class="control-card">
          <span>
            <strong>参加者CSV</strong>
            <span class="help">CSVを選ぶと、その場で名簿を作成します。対象は Venue Type = competitor、Venue Fee Name = 一般枠 / 持参枠 です。</span>
          </span>
          <input id="csvInput" type="file" accept=".csv,text/csv" />
        </label>

        <label class="control-card">
          <span>
            <strong>一般枠の料金</strong>
            <span class="help">一般枠名簿の上部に表示します。</span>
          </span>
          <span class="input-row">
            <input id="generalFeeInput" type="number" min="0" inputmode="numeric" placeholder="例: 1500" />
            <span class="yen">円</span>
          </span>
        </label>

        <label class="control-card">
          <span>
            <strong>持参枠の料金</strong>
            <span class="help">持参枠名簿の上部に表示します。</span>
          </span>
          <span class="input-row">
            <input id="bringFeeInput" type="number" min="0" inputmode="numeric" placeholder="例: 1000" />
            <span class="yen">円</span>
          </span>
        </label>
      </div>

      <div class="station-controls" aria-label="台番号設定">
        <label class="control-card">
          <span>
            <strong>使用できる台番号の上限</strong>
            <span class="help">例: 24 の場合、1〜24が候補になります。</span>
          </span>
          <input id="stationMaxInput" type="number" min="1" step="1" inputmode="numeric" placeholder="例: 24" />
        </label>

        <label class="control-card">
          <span>
            <strong>スタッフ使用台番号</strong>
            <span class="help">カンマ区切りで入力。例: 2,5,9。ここに書いた番号は候補から除外します。</span>
          </span>
          <input id="reservedStationsInput" type="text" inputmode="numeric" placeholder="例: 2,5,9" />
        </label>

        <div class="control-card">
          <span>
            <strong>リセット</strong>
            <span class="help">チェック状態と台番号だけを消します。</span>
          </span>
          <button id="resetRosterButton" type="button">名簿状態をリセット</button>
        </div>
      </div>
      </div>
    </div>
  </header>

  <div class="status-wrap">
    <div id="csvStatus" class="status">ページ上部の「参加者CSV」からCSVファイルを選択してください。</div>
  </div>

  <main>
    <section class="lists" aria-label="名簿">
      <article class="roster-card" aria-labelledby="generalTitle">
        <div class="roster-head">
          <div>
            <h2 id="generalTitle">一般枠</h2>
            <div id="generalSummary" class="summary"></div>
          </div>
          <div id="generalFeeBadge" class="fee-badge"><small>参加費</small>未入力</div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>名前</th>
                <th class="check-cell">チェック</th>
              </tr>
            </thead>
            <tbody id="generalBody"></tbody>
          </table>
        </div>
      </article>

      <article class="roster-card" aria-labelledby="bringTitle">
        <div class="roster-head">
          <div>
            <h2 id="bringTitle">持参枠</h2>
            <div id="bringSummary" class="summary"></div>
          </div>
          <div id="bringFeeBadge" class="fee-badge"><small>参加費</small>未入力</div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>名前</th>
                <th class="station-cell">台番号</th>
                <th class="check-cell">チェック</th>
              </tr>
            </thead>
            <tbody id="bringBody"></tbody>
          </table>
        </div>
      </article>
    </section>

    <div class="note">CSVから抽出: Venue Type = competitor / Venue Fee Name = 一般枠・持参枠。チェック済みの参加者は各名簿の下へ移動します。</div>
  </main>

  <script>
    const STORAGE_PREFIX = 'venue-roster-csv-v3';
    const ASCII_COLLATOR = new Intl.Collator('en', { numeric: true, sensitivity: 'base' });
    const JA_COLLATOR = new Intl.Collator('ja-JP', { numeric: true, sensitivity: 'base' });

    let participants = [];
    let currentFileName = '';

    const state = {
      checked: new Map(),
      station: new Map(),
    };

    const elements = {
      appHeader: document.getElementById('appHeader'),
      statusWrap: document.querySelector('.status-wrap'),
      csvInput: document.getElementById('csvInput'),
      csvStatus: document.getElementById('csvStatus'),
      settingsPanel: document.getElementById('settingsPanel'),
      settingsToggleButton: document.getElementById('settingsToggleButton'),
      settingsSummary: document.getElementById('settingsSummary'),
      generalFeeInput: document.getElementById('generalFeeInput'),
      bringFeeInput: document.getElementById('bringFeeInput'),
      stationMaxInput: document.getElementById('stationMaxInput'),
      reservedStationsInput: document.getElementById('reservedStationsInput'),
      resetRosterButton: document.getElementById('resetRosterButton'),
      generalSummary: document.getElementById('generalSummary'),
      bringSummary: document.getElementById('bringSummary'),
      generalBody: document.getElementById('generalBody'),
      bringBody: document.getElementById('bringBody'),
      generalFeeBadge: document.getElementById('generalFeeBadge'),
      bringFeeBadge: document.getElementById('bringFeeBadge'),
    };

    function settingKey(kind) {
      return `${STORAGE_PREFIX}:setting:${kind}`;
    }

    function rosterKey(kind, id) {
      return `${STORAGE_PREFIX}:roster:${kind}:${id}`;
    }

    function normalizeHeader(value) {
      return String(value || '')
        .trim()
        .toLowerCase()
        .replace(/[\s_\-]+/g, '');
    }

    function normalizeText(value) {
      return String(value || '').trim().normalize('NFKC');
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function setStatus(message, kind = '') {
      elements.csvStatus.textContent = message;
      elements.csvStatus.className = `status ${kind}`.trim();
    }

    function formatYen(value) {
      const raw = String(value || '').trim();
      if (!raw) return '未入力';
      const number = Number(raw);
      if (!Number.isFinite(number)) return `${raw}円`;
      return `${number.toLocaleString('ja-JP')}円`;
    }

    function parsePositiveInteger(value) {
      const raw = String(value || '').trim();
      if (!/^\d+$/.test(raw)) return 0;
      const number = Number(raw);
      return Number.isSafeInteger(number) && number > 0 ? number : 0;
    }

    function parseCsv(text) {
      const source = String(text || '').replace(/^\uFEFF/, '');
      const rows = [];
      let row = [];
      let field = '';
      let inQuotes = false;

      function endField() {
        row.push(field);
        field = '';
      }

      function endRow() {
        endField();
        if (row.some((cell) => String(cell).trim() !== '')) rows.push(row);
        row = [];
      }

      for (let i = 0; i < source.length; i += 1) {
        const char = source[i];

        if (inQuotes) {
          if (char === '"') {
            if (source[i + 1] === '"') {
              field += '"';
              i += 1;
            } else {
              inQuotes = false;
            }
          } else {
            field += char;
          }
          continue;
        }

        if (char === '"') {
          inQuotes = true;
        } else if (char === ',') {
          endField();
        } else if (char === '\n') {
          endRow();
        } else if (char === '\r') {
          if (source[i + 1] === '\n') i += 1;
          endRow();
        } else {
          field += char;
        }
      }

      if (field !== '' || row.length > 0) endRow();
      if (rows.length === 0) return [];

      const headers = rows[0].map((header) => String(header || '').trim());
      return rows.slice(1).map((cells) => {
        const item = { __headers: headers };
        headers.forEach((header, index) => {
          item[header] = cells[index] ?? '';
        });
        return item;
      });
    }

    function getField(row, candidates) {
      const normalized = new Map();
      for (const key of Object.keys(row)) {
        normalized.set(normalizeHeader(key), key);
      }
      for (const candidate of candidates) {
        const actualKey = normalized.get(normalizeHeader(candidate));
        if (actualKey !== undefined) return row[actualKey];
      }
      return '';
    }

    function getDisplayName(row) {
      const shortTag = getField(row, ['Short GamerTag', 'ShortGamerTag']);
      const gamerTag = getField(row, ['GamerTag', 'Gamer Tag', 'Tag']);
      const firstName = getField(row, ['First Name', 'FirstName']);
      const lastName = getField(row, ['Last Name', 'LastName']);
      const confirmation = getField(row, ['Confirmation Number', 'ConfirmationNumber']);
      const id = getField(row, ['Id', 'ID']);

      return normalizeText(
        shortTag ||
        gamerTag ||
        [lastName, firstName].filter(Boolean).join(' ') ||
        confirmation ||
        id ||
        '名前未設定'
      );
    }

    function feeTypeFromName(feeName) {
      const value = normalizeText(feeName);
      if (value.includes('持参枠')) return '持参枠';
      if (value.includes('一般枠')) return '一般枠';
      return '';
    }

    function rowToParticipant(row, index) {
      const name = getDisplayName(row);
      const rawId = normalizeText(
        getField(row, ['Id', 'ID']) ||
        getField(row, ['Confirmation Number', 'ConfirmationNumber']) ||
        `${name}-${index}`
      );
      const id = rawId || `${name}-${index}`;

      return {
        id,
        name,
        feeType: feeTypeFromName(getField(row, ['Venue Fee Name', 'VenueFeeName'])),
      };
    }

    function buildParticipants(rows) {
      return rows
        .filter((row) => normalizeText(getField(row, ['Venue Type', 'VenueType'])).toLowerCase() === 'competitor')
        .filter((row) => feeTypeFromName(getField(row, ['Venue Fee Name', 'VenueFeeName'])) !== '')
        .map(rowToParticipant);
    }

    function asciiGroup(name) {
      const first = normalizeText(name).charAt(0);
      return /^[A-Za-z0-9]/.test(first) ? 0 : 1;
    }

    function isChecked(id) {
      return state.checked.get(String(id)) === true;
    }

    function compareRosterOrder(a, b) {
      const an = normalizeText(a.name);
      const bn = normalizeText(b.name);
      const ag = asciiGroup(an);
      const bg = asciiGroup(bn);
      if (ag !== bg) return ag - bg;
      const result = ag === 0 ? ASCII_COLLATOR.compare(an, bn) : JA_COLLATOR.compare(an, bn);
      if (result !== 0) return result;
      return String(a.id).localeCompare(String(b.id));
    }

    function sortRoster(list) {
      return [...list].sort((a, b) => {
        const ac = isChecked(a.id) ? 1 : 0;
        const bc = isChecked(b.id) ? 1 : 0;
        if (ac !== bc) return ac - bc;
        return compareRosterOrder(a, b);
      });
    }

    function loadSettings() {
      elements.generalFeeInput.value = localStorage.getItem(settingKey('generalFee')) || '';
      elements.bringFeeInput.value = localStorage.getItem(settingKey('bringFee')) || '';
      elements.stationMaxInput.value = localStorage.getItem(settingKey('stationMax')) || '';
      elements.reservedStationsInput.value = localStorage.getItem(settingKey('reservedStations')) || '';
      setSettingsHidden(localStorage.getItem(settingKey('settingsHidden')) === '1', false);
    }

    function getCurrentFileLabel() {
      return currentFileName || 'CSV未選択';
    }

    function renderSettingsSummary() {
      const max = getStationMax();
      const reserved = getReservedStations();
      const generalCount = participants.filter((participant) => participant.feeType === '一般枠').length;
      const bringCount = participants.filter((participant) => participant.feeType === '持参枠').length;
      const participantSummary = participants.length > 0 ? ` / 名簿: 一般枠 ${generalCount}名・持参枠 ${bringCount}名` : '';
      const reservedSummary = reserved.size > 0 ? ` / スタッフ使用: ${[...reserved].sort((a, b) => a - b).join(',')}` : '';

      elements.settingsSummary.textContent = [
        getCurrentFileLabel(),
        `一般枠: ${formatYen(elements.generalFeeInput.value)}`,
        `持参枠: ${formatYen(elements.bringFeeInput.value)}`,
        `台番号上限: ${max > 0 ? max : '未設定'}`,
      ].join(' / ') + reservedSummary + participantSummary;
    }

    function setSettingsHidden(hidden, persist = true) {
      elements.settingsPanel.classList.toggle('is-hidden', hidden);
      document.body.classList.toggle('settings-hidden', hidden);
      elements.appHeader.hidden = hidden;
      elements.statusWrap.hidden = hidden;
      elements.settingsToggleButton.textContent = hidden ? '設定表示' : '設定隠す';
      elements.settingsToggleButton.setAttribute('aria-expanded', String(!hidden));
      elements.settingsToggleButton.setAttribute('aria-label', hidden ? '設定を表示' : '設定を隠す');
      if (persist) {
        localStorage.setItem(settingKey('settingsHidden'), hidden ? '1' : '0');
      }
      renderSettingsSummary();
    }

    function loadRosterStateForParticipants() {
      for (const participant of participants) {
        const id = String(participant.id);
        if (!state.checked.has(id)) {
          state.checked.set(id, localStorage.getItem(rosterKey('checked', id)) === '1');
        }
        if (!state.station.has(id)) {
          state.station.set(id, localStorage.getItem(rosterKey('station', id)) || '');
        }
      }
    }

    function getStationMax() {
      return parsePositiveInteger(elements.stationMaxInput.value);
    }

    function getReservedStations() {
      const max = getStationMax();
      const values = String(elements.reservedStationsInput.value || '')
        .split(/[\s,、，]+/)
        .map(parsePositiveInteger)
        .filter((number) => number > 0)
        .filter((number) => max === 0 || number <= max);
      return new Set(values);
    }

    function getAssignedStations(exceptId = '') {
      const assigned = new Set();
      for (const participant of participants) {
        if (participant.feeType !== '持参枠') continue;
        const id = String(participant.id);
        if (id === String(exceptId)) continue;
        const station = parsePositiveInteger(state.station.get(id));
        if (station > 0) assigned.add(station);
      }
      return assigned;
    }

    function getAvailableStationsFor(id) {
      const max = getStationMax();
      if (max <= 0) return [];

      const reserved = getReservedStations();
      const assignedByOthers = getAssignedStations(id);
      const stations = [];
      for (let number = 1; number <= max; number += 1) {
        if (reserved.has(number)) continue;
        if (assignedByOthers.has(number)) continue;
        stations.push(number);
      }
      return stations;
    }

    function isValidStationFor(id, station) {
      if (!station) return true;
      const max = getStationMax();
      if (max <= 0 || station < 1 || station > max) return false;
      if (getReservedStations().has(station)) return false;
      if (getAssignedStations(id).has(station)) return false;
      return true;
    }

    function buildStationSelect(participant) {
      const id = String(participant.id);
      const current = parsePositiveInteger(state.station.get(id));
      const max = getStationMax();
      const available = getAvailableStationsFor(id);
      const validCurrent = isValidStationFor(id, current);
      const options = [];
      const disabled = max <= 0 ? 'disabled' : '';
      const invalidClass = current && !validCurrent ? ' invalid' : '';

      options.push(`<option value="">${max <= 0 ? '上限未設定' : '未選択'}</option>`);

      if (current > 0 && !available.includes(current)) {
        const label = validCurrent ? String(current) : `${current}（使用不可）`;
        options.push(`<option value="${current}" selected>${escapeHtml(label)}</option>`);
      }

      for (const station of available) {
        const selected = station === current ? 'selected' : '';
        options.push(`<option value="${station}" ${selected}>${station}</option>`);
      }

      return `<select class="station-select${invalidClass}" data-station-id="${escapeHtml(id)}" aria-label="${escapeHtml(participant.name)}の台番号" ${disabled}>${options.join('')}</select>`;
    }

    function stationSummary() {
      const max = getStationMax();
      if (max <= 0) return '台番号上限: 未設定';

      const reserved = getReservedStations();
      const assigned = getAssignedStations();
      const assignedCount = [...assigned].filter((number) => number >= 1 && number <= max).length;
      let availableCount = 0;
      for (let number = 1; number <= max; number += 1) {
        if (!reserved.has(number) && !assigned.has(number)) availableCount += 1;
      }
      return `台番号: 1〜${max} / スタッフ使用 ${reserved.size}台 / 割当済み ${assignedCount}台 / 未使用候補 ${availableCount}台`;
    }

    function renderFees() {
      elements.generalFeeBadge.innerHTML = `<small>参加費</small>${formatYen(elements.generalFeeInput.value)}`;
      elements.bringFeeBadge.innerHTML = `<small>参加費</small>${formatYen(elements.bringFeeInput.value)}`;
    }

    function renderRoster(feeType, body, summary) {
      const list = participants.filter((participant) => participant.feeType === feeType);
      const sorted = sortRoster(list);
      const checkedCount = list.filter((participant) => isChecked(participant.id)).length;
      const uncheckedCount = list.length - checkedCount;
      const extraSummary = feeType === '持参枠' ? `<br>${stationSummary()}` : '';

      summary.innerHTML = `合計 ${list.length}名 / 未チェック ${uncheckedCount}名 / チェック済み ${checkedCount}名${extraSummary}`;

      if (participants.length === 0) {
        const colspan = feeType === '持参枠' ? 3 : 2;
        body.innerHTML = `<tr><td class="empty" colspan="${colspan}">上部から参加者CSVを選択してください。</td></tr>`;
        return;
      }

      if (sorted.length === 0) {
        const colspan = feeType === '持参枠' ? 3 : 2;
        body.innerHTML = `<tr><td class="empty" colspan="${colspan}">該当者はいません。</td></tr>`;
        return;
      }

      body.innerHTML = sorted.map((participant) => {
        const id = String(participant.id);
        const checked = isChecked(id);
        const name = escapeHtml(participant.name);
        if (feeType === '持参枠') {
          return `
            <tr class="${checked ? 'checked' : ''}">
              <td class="name">${name}</td>
              <td class="station-cell">${buildStationSelect(participant)}</td>
              <td class="check-cell"><input type="checkbox" data-check-id="${escapeHtml(id)}" ${checked ? 'checked' : ''} aria-label="${name}をチェック"></td>
            </tr>`;
        }
        return `
          <tr class="${checked ? 'checked' : ''}">
            <td class="name">${name}</td>
            <td class="check-cell"><input type="checkbox" data-check-id="${escapeHtml(id)}" ${checked ? 'checked' : ''} aria-label="${name}をチェック"></td>
          </tr>`;
      }).join('');
    }

    function render() {
      renderFees();
      renderRoster('一般枠', elements.generalBody, elements.generalSummary);
      renderRoster('持参枠', elements.bringBody, elements.bringSummary);
      renderSettingsSummary();
    }

    async function readCsvFile(file) {
      const buffer = await file.arrayBuffer();
      const encodings = ['utf-8', 'shift_jis'];
      for (const encoding of encodings) {
        try {
          return new TextDecoder(encoding, { fatal: true }).decode(buffer);
        } catch (_) {
          // Try the next encoding.
        }
      }
      return new TextDecoder('utf-8').decode(buffer);
    }

    async function handleCsvFile(file) {
      try {
        const text = await readCsvFile(file);
        const rows = parseCsv(text);
        participants = buildParticipants(rows);
        currentFileName = file.name || '';
        loadRosterStateForParticipants();

        const competitorRows = rows.filter((row) => normalizeText(getField(row, ['Venue Type', 'VenueType'])).toLowerCase() === 'competitor');
        const generalCount = participants.filter((participant) => participant.feeType === '一般枠').length;
        const bringCount = participants.filter((participant) => participant.feeType === '持参枠').length;

        if (rows.length === 0) {
          setStatus('CSVに行が見つかりませんでした。ファイル内容を確認してください。', 'error');
        } else if (participants.length === 0) {
          setStatus(`CSVは読み込みましたが、対象者が見つかりませんでした。読み込み行数: ${rows.length}行 / competitor: ${competitorRows.length}行。Venue Fee Name が 一般枠 または 持参枠 になっているか確認してください。`, 'warn');
        } else {
          setStatus(`${currentFileName} を読み込みました。名簿対象 ${participants.length}名（一般枠 ${generalCount}名 / 持参枠 ${bringCount}名）。competitor全体は ${competitorRows.length}名です。`, 'ok');
        }
        render();
      } catch (error) {
        console.error(error);
        participants = [];
        setStatus('CSVの読み込みに失敗しました。CSV形式、文字コード、ヘッダー名を確認してください。', 'error');
        render();
      }
    }

    elements.csvInput.addEventListener('change', (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      handleCsvFile(file);
    });

    document.addEventListener('change', (event) => {
      const checkInput = event.target.closest('[data-check-id]');
      if (checkInput) {
        const id = String(checkInput.dataset.checkId);
        state.checked.set(id, checkInput.checked);
        localStorage.setItem(rosterKey('checked', id), checkInput.checked ? '1' : '0');
        render();
        return;
      }

      const stationSelect = event.target.closest('[data-station-id]');
      if (stationSelect) {
        const id = String(stationSelect.dataset.stationId);
        state.station.set(id, stationSelect.value);
        localStorage.setItem(rosterKey('station', id), stationSelect.value);
        render();
      }
    });

    document.addEventListener('input', (event) => {
      if (event.target === elements.generalFeeInput) {
        localStorage.setItem(settingKey('generalFee'), event.target.value);
        renderFees();
        renderSettingsSummary();
        return;
      }
      if (event.target === elements.bringFeeInput) {
        localStorage.setItem(settingKey('bringFee'), event.target.value);
        renderFees();
        renderSettingsSummary();
        return;
      }
      if (event.target === elements.stationMaxInput) {
        localStorage.setItem(settingKey('stationMax'), event.target.value);
        render();
        return;
      }
      if (event.target === elements.reservedStationsInput) {
        localStorage.setItem(settingKey('reservedStations'), event.target.value);
        render();
      }
    });

    elements.settingsToggleButton.addEventListener('click', () => {
      setSettingsHidden(!document.body.classList.contains('settings-hidden'));
    });

    elements.resetRosterButton.addEventListener('click', () => {
      for (const participant of participants) {
        const id = String(participant.id);
        state.checked.set(id, false);
        state.station.set(id, '');
        localStorage.removeItem(rosterKey('checked', id));
        localStorage.removeItem(rosterKey('station', id));
      }
      render();
      if (participants.length > 0) {
        setStatus(`${currentFileName || 'CSV'} のチェック状態と台番号をリセットしました。`, 'ok');
      } else {
        setStatus('リセットしました。CSVを読み込むと名簿が表示されます。', 'ok');
      }
    });

    loadSettings();
    render();
  </script>
</body>
</html>
